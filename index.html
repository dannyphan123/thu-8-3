<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy 8/3</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
font-family:sans-serif;
}

/* PHONG BÌ */

.envelope{

width:300px;
height:180px;
background:#ff4d88;
border-radius:12px;
position:relative;

}

.flap{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:#ff6fa0;

clip-path:polygon(0 0,100% 0,50% 60%);

transform-origin:top;

transition:0.8s;

}

.envelope.open .flap{

transform:rotateX(180deg);

}

/* THƯ NHỎ */

.letter{

position:absolute;

top:20px;
left:20px;
right:20px;
bottom:20px;

background:white;

border-radius:10px;

padding:15px;

text-align:center;

font-family:'Dancing Script',cursive;

transform:translateY(120%);

transition:0.8s;

}

.envelope.open .letter{

transform:translateY(-20px);

}

/* BUTTON */

button{

padding:10px 18px;

background:#ff4d88;

border:none;

color:white;

border-radius:8px;

cursor:pointer;

margin-top:10px;

}

/* MÀN HÌNH THƯ */

#main{

display:none;

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

}

/* LÁ THƯ */

.bigLetter{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:85%;
max-width:380px;

background:white;

padding:25px;

border-radius:15px;

font-family:'Dancing Script',cursive;

font-size:20px;

line-height:1.6;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,0.25);

animation:appear 1s ease;

}

@keyframes appear{

from{

opacity:0;
transform:translate(-50%,-30%) scale(0.8);

}

to{

opacity:1;
transform:translate(-50%,-50%) scale(1);

}

}

/* HOA HỒNG */

.bigRose{

position:absolute;

width:200px;

bottom:-100px;

right:-70px;

transform:rotate(-10deg);

}

/* ẢNH */

.photo{

position:absolute;

width:140px;

border-radius:15px;

opacity:0;

box-shadow:0 10px 20px rgba(0,0,0,0.3);

animation:fade 2s forwards;

}

.photo1{

top:15%;
left:5%;

animation-delay:1s;

transform:rotate(-6deg);

}

.photo2{

bottom:10%;
right:5%;

animation-delay:2s;

transform:rotate(6deg);

}

.photo3{

top:10%;
right:5%;

animation-delay:3s;

transform:rotate(-4deg);

}

@keyframes fade{

from{

opacity:0;

transform:scale(0.8);

}

to{

opacity:1;

transform:scale(1);

}

}

/* TIM VÀ HOA */

.heart,.rose{

position:absolute;

top:-10px;

font-size:48px;

animation:fall linear infinite;

}

@keyframes fall{

0%{

transform:translateY(-10vh);

opacity:1;

}

100%{

transform:translateY(110vh);

opacity:0;

}

}

/* MOBILE */

@media(max-width:600px){

.photo{

width:110px;

}

.bigRose{

width:150px;

bottom:-80px;

right:-50px;

}

}

</style>

</head>

<body>

<!-- PHONG BÌ -->

<div class="envelope" id="env">

<div class="flap"></div><div class="letter">

<h2>💌 Thư gửi cháu</h2>

<p>Bấm mở thư nhé</p>

<button onclick="openEnvelope()">Mở thư</button>

</div>

</div>

<!-- MÀN HÌNH THƯ -->

<div id="main">

<div class="bigLetter">

Nhân ngày 8/3, chú chúc cháu luôn vui vẻ, ăn ngon ngủ kỹ và… bớt lười lại một chút.

<br><br>

Mà nghĩ lại thì thôi, cháu cứ lười như bình thường cũng được. Miễn là vẫn cười nhiều là chú thấy ổn rồi.

<br><br>

Chúc cháu một ngày 8/3 thật vui.

<br><br>



<img src="rose.png" class="bigRose">

</div>

<img src="photo1.jpg" class="photo photo1">
<img src="photo2.jpg" class="photo photo2">
<img src="photo3.jpg" class="photo photo3">

</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<script>

function openEnvelope(){

let env=document.getElementById("env");

env.classList.add("open");

setTimeout(()=>{

env.style.display="none";

document.getElementById("main").style.display="block";

document.getElementById("music").play();

startEffect();

},800);

}

function startEffect(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=4+Math.random()*4+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),7000);

},500);

setInterval(()=>{

let rose=document.createElement("div");

rose.className="rose";

rose.innerHTML="🌹";

rose.style.left=Math.random()*100+"vw";

rose.style.animationDuration=4+Math.random()*4+"s";

document.body.appendChild(rose);

setTimeout(()=>rose.remove(),7000);

},700);

}

</script>

</body>

</html>
